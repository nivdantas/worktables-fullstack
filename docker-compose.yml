version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: worktables-api
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-3001}
      WEATHER_API_KEY: ${WEATHER_API_KEY}
    ports:
      - "${API_PORT:-3001}:3001"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    container_name: worktables-web
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    restart: unless-stopped